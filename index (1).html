<!DOCTYPE html>
<html>
<head>
    <title>AI Maze Solver</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>AI Maze Solver</h1>

        <p>
            Select Algorithm and Solve the Maze
        </p>

        <div class="controls">

            <select id="algorithm">

                <option>BFS</option>
                <option>DFS</option>
                <option>UCS</option>
                <option>A*</option>

            </select>

            <button onclick="solveMaze()">
                Solve Maze
            </button>

            <button onclick="resetMaze()">
                Reset
            </button>

        </div>

        <div class="maze" id="maze">

            <div class="cell start"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell wall"></div>
            <div class="cell"></div>

            <div class="cell wall"></div>
            <div class="cell wall"></div>
            <div class="cell"></div>
            <div class="cell wall"></div>
            <div class="cell"></div>

            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell path"></div>
            <div class="cell path"></div>
            <div class="cell"></div>

            <div class="cell"></div>
            <div class="cell wall"></div>
            <div class="cell wall"></div>
            <div class="cell wall"></div>
            <div class="cell"></div>

            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell wall"></div>
            <div class="cell goal"></div>

        </div>

        <div class="result">

            <h2>Result</h2>

            <p id="output">
                Waiting for Algorithm...
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
